services:
  - type: web
    name: opscore-dashboard
    runtime: node
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 20.11.0
      - key: VEEQO_API_KEY
        sync: false
      - key: AMAZON_SELLER_ID
        sync: false
      - key: AMAZON_CLIENT_ID
        sync: false
      - key: AMAZON_CLIENT_SECRET
        sync: false
      - key: AMAZON_REFRESH_TOKEN
        sync: false
      - key: AMAZON_MARKETPLACE_ID
        sync: false
      - key: AMAZON_SELLER_RATING
        sync: false
      - key: EBAY_TOKEN
        sync: false
      - key: EBAY_ENV
        sync: false
      - key: GOOGLE_SHEETS_API_KEY
        sync: false
      - key: GOOGLE_SHEETS_ID
        sync: false
      - key: GOOGLE_SHEETS_RANGE
        sync: false
      - key: NEXT_PUBLIC_CURRENCY
        value: "£"
      - key: NEXT_PUBLIC_REFRESH_INTERVAL
        value: "60"
      # Live View globe — arc destination (your main warehouse). Optional;
      # defaults to a central-UK point if unset.
      - key: WAREHOUSE_LAT
        sync: false
      - key: WAREHOUSE_LNG
        sync: false
      # Live View — GA4 realtime visitors (optional). Property ID is numeric;
      # the JSON is the service-account key pasted whole. Unset = visitor layer
      # stays hidden.
      - key: GA4_PROPERTY_ID
        sync: false
      - key: GA4_SERVICE_ACCOUNT_JSON
        sync: false
      # OAuth alternative (used when the GA4 property's org blocks service
      # accounts). Refresh token for a user with GA access; client id/secret
      # fall back to the GOOGLE_ADS_* pair if these aren't set.
      - key: GA4_REFRESH_TOKEN
        sync: false
      - key: GA4_OAUTH_CLIENT_ID
        sync: false
      - key: GA4_OAUTH_CLIENT_SECRET
        sync: false
